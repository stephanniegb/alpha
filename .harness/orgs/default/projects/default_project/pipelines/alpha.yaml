pipeline:
  name: alpha
  identifier: alpha
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: alpha
        build: <+input>
  stages:
    - stage:
        name: Build
        identifier: Build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec:
              imageSpec:
                imageName: node:22
          execution:
            steps:
              - step:
                  type: Run
                  name: Setup
                  identifier: Setup
                  spec:
                    shell: Sh
                    command: |
                      echo "=== Environment ==="
                      node --version

                      echo "=== Enable pnpm ==="
                      corepack enable

                      echo "=== PNPM Version ==="
                      pnpm --version
              - step:
                  type: Run
                  name: Check PNPM
                  identifier: Check_PNPM
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Lockfile Version ==="
                      grep lockfileVersion pnpm-lock.yaml || true
                      echo "=== PNPM Version ==="
                      pnpm --version
              - step:
                  type: Run
                  name: InstallDependencies
                  identifier: InstallDependencies
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Current Versions ==="
                      node --version
                      npm --version

                      echo "=== Install PNPM 9 ==="
                      npm install -g pnpm@9

                      echo "=== PNPM Version ==="
                      pnpm --version

                      echo "=== Install Dependencies ==="
                      pnpm install --frozen-lockfile
              - step:
                  type: Run
                  name: GitDebug
                  identifier: GitDebug
                  spec:
                    shell: Sh
                    command: |
                      echo "=== Branch ==="
                      git branch

                      echo "=== Recent Commits ==="
                      git log --oneline -5
              - step:
                  type: Run
                  name: ShowProjects
                  identifier: ShowProjects
                  spec:
                    shell: Sh
                    command: |
                      echo "=== Nx Projects ==="
                      pnpm nx show projects
              - step:
                  type: Run
                  name: ShowAffected
                  identifier: ShowAffected
                  spec:
                    shell: Sh
                    command: |
                      echo "=== Affected Projects ==="
                      pnpm nx show projects --affected --base=HEAD~1 --head=HEAD
              - step:
                  type: Run
                  name: BuildAffected
                  identifier: BuildAffected
                  spec:
                    shell: Sh
                    command: |
                      echo "=== Building Affected Projects ==="
                      pnpm nx affected -t build --base=HEAD~1 --head=HEAD
